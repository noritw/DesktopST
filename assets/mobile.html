<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#CBFBC4">
<title>DesktopST</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mint: #CBFBC4;
    --mint2: #AAEEDD;
    --sky: #AAEEFF;
    --butter: #FFE8AA;
    --pink: #FFBBBB;
    --bg: #F7FFFC;
    --surface: #ffffff;
    --user-bubble: #AAEEFF;
    --text: #3D5A52;
    --text-sub: #7AA898;
    --border: rgba(0,0,0,0.08);
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px; overscroll-behavior: none; }

  body { display: flex; flex-direction: column; height: 100dvh; }

  /* ── Header ── */
  #header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px 8px;
    padding-top: max(10px, env(safe-area-inset-top));
    background: var(--mint);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #char-avatars { display: flex; gap: 6px; flex: 1; overflow-x: auto; scrollbar-width: none; }
  #char-avatars::-webkit-scrollbar { display: none; }
  .char-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover;
    border: 2px solid rgba(255,255,255,0.7); flex-shrink: 0; background: var(--mint2); }
  .char-avatar-ph { width: 38px; height: 38px; border-radius: 50%; background: var(--mint2);
    display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  #header-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn { width: 36px; height: 36px; border-radius: 50%; border: none;
    background: rgba(255,255,255,0.6); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; color: var(--text);
    transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
  .icon-btn:active { background: rgba(255,255,255,0.9); }

  /* ── PC menu dropdown ── */
  #pc-menu-wrap { position: relative; }
  #pc-menu { display: none; position: absolute; top: 42px; right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    min-width: 175px; padding: 4px; z-index: 300; }
  #pc-menu.visible { display: block; }
  .pc-menu-item { display: block; width: 100%; text-align: left;
    background: none; border: none; padding: 9px 12px; border-radius: 8px;
    font-size: 14px; color: var(--text); cursor: pointer; font-family: inherit;
    -webkit-tap-highlight-color: transparent; white-space: nowrap; }
  .pc-menu-item:active { background: var(--mint); }
  .pc-menu-info { padding: 7px 12px 4px; font-size: 12px; color: var(--text-sub); white-space: nowrap; }
  .pc-menu-sep { height: 1px; background: var(--border); margin: 4px 0; }

  /* ── PC windows/displays sheet ── */
  #pc-sheet-overlay { display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.25); z-index: 400; align-items: flex-end; }
  #pc-sheet-overlay.visible { display: flex; }
  #pc-sheet { width: 100%; background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
    display: flex; flex-direction: column; max-height: 70dvh; }
  #pc-sheet-header { padding: 14px 16px 0; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0; }
  #pc-sheet-title { font-size: 15px; font-weight: 600; }
  #pc-sheet-close { background: none; border: none; font-size: 20px; cursor: pointer;
    color: var(--text-sub); padding: 0 4px; }
  #pc-sheet-body { overflow-y: auto; flex: 1; padding: 8px 12px;
    padding-bottom: max(12px, env(safe-area-inset-bottom)); }
  #pc-sheet-loading { text-align: center; padding: 24px; color: var(--text-sub); font-size: 14px; }
  .pc-win-item { display: flex; flex-direction: column; padding: 10px 8px;
    border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 8px;
    -webkit-tap-highlight-color: transparent; }
  .pc-win-item:active { background: var(--mint); }
  .pc-win-title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pc-win-proc { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  .pc-disp-item { display: flex; align-items: center; padding: 12px 8px;
    border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 8px; gap: 10px;
    -webkit-tap-highlight-color: transparent; }
  .pc-disp-item:active { background: var(--mint); }
  .pc-disp-item.selected { background: var(--mint); }
  .pc-disp-label { font-size: 14px; flex: 1; }
  .pc-disp-check { font-size: 16px; }

  /* ── Chat ── */
  #chat { flex: 1; overflow-y: auto; padding: 12px 12px 4px;
    display: flex; flex-direction: column; gap: 10px;
    -webkit-overflow-scrolling: touch; }

  .msg { display: flex; gap: 8px; max-width: 88%; align-items: flex-end; }
  .msg.user { align-self: flex-end; }
  .msg.character, .msg.system { align-self: flex-start; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
    flex-shrink: 0; background: var(--mint2); }
  .msg-avatar-ph { width: 32px; height: 32px; border-radius: 50%; background: var(--mint2);
    display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .msg-col { display: flex; flex-direction: column; }
  .char-name { font-size: 12px; color: var(--text-sub); margin-bottom: 2px; padding-left: 4px; }
  .bubble { padding: 9px 13px; border-radius: 18px; line-height: 1.5;
    word-break: break-word; white-space: pre-wrap; font-size: 15px; }
  .msg.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
  .msg.character .bubble { background: var(--surface); border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .msg.system .bubble { background: transparent; color: var(--text-sub);
    font-size: 13px; padding: 4px 8px; }
  .msg.system .bubble.err { color: #E85D3F; background: rgba(232,93,63,0.07);
    border-radius: 10px; padding: 6px 10px; }

  .thinking-indicator { display: flex; gap: 4px; padding: 10px 14px;
    background: #fff; border-radius: 18px; border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06); align-self: flex-start; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-sub);
    animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* ── Thinking bar ── */
  #thinking-bar { display: none; padding: 5px 16px;
    font-size: 13px; color: var(--text-sub); background: var(--bg);
    border-top: 1px solid var(--border); flex-shrink: 0; }
  #thinking-bar.visible { display: block; }

  /* ── Input area ── */
  #input-area { display: flex; flex-direction: column; gap: 6px; padding: 8px 10px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
  #pending-random { display: none; align-items: center; gap: 6px;
    background: var(--butter); border-radius: var(--radius-sm); padding: 6px 10px;
    font-size: 13px; color: var(--text); }
  #pending-random.visible { display: flex; }
  #clear-random { margin-left: auto; background: none; border: none; cursor: pointer;
    font-size: 16px; color: var(--text-sub); padding: 0 2px; }
  #input-row { display: flex; gap: 6px; align-items: flex-end; }
  #tool-bar { display: flex; gap: 6px; }
  .tool-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--mint2);
    background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer;
    white-space: nowrap; -webkit-tap-highlight-color: transparent; font-family: inherit; }
  .tool-btn:active { background: var(--mint); }
  #msg-input { flex: 1; border: 1.5px solid var(--mint2); border-radius: 20px;
    padding: 9px 14px; font-size: 15px; color: var(--text); background: var(--bg);
    resize: none; outline: none; max-height: 120px; overflow-y: auto;
    line-height: 1.4; font-family: inherit; }
  #send-btn { width: 40px; height: 40px; border-radius: 50%; border: none;
    background: var(--mint2); color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
  #send-btn:active { background: var(--mint); }
  #send-btn:disabled { opacity: 0.5; cursor: default; }

  /* ── Bottom sheets (shared) ── */
  .sheet-overlay { display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.25); z-index: 100; align-items: flex-end; }
  .sheet-overlay.visible { display: flex; }
  .sheet { width: 100%; background: var(--surface); border-radius: var(--radius) var(--radius) 0 0;
    display: flex; flex-direction: column; max-height: 80dvh; }
  .sheet-header { padding: 16px 16px 0; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0; }
  .sheet-title { font-size: 16px; font-weight: 600; }
  .sheet-close { background: none; border: none; font-size: 20px; cursor: pointer;
    color: var(--text-sub); padding: 0 4px; }
  .sheet-tabs { display: flex; gap: 0; padding: 10px 16px 0; flex-shrink: 0;
    border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .sheet-tabs::-webkit-scrollbar { display: none; }
  .tab-btn { padding: 8px 14px; border: none; background: none; font-size: 14px;
    color: var(--text-sub); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent;
    margin-bottom: -1px; font-family: inherit; -webkit-tap-highlight-color: transparent; }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--mint2); font-weight: 600; }
  .sheet-body { overflow-y: auto; flex: 1; padding: 12px 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom)); }

  .list-item { display: flex; align-items: center; gap: 10px;
    padding: 12px 8px; border-bottom: 1px solid var(--border); cursor: pointer;
    -webkit-tap-highlight-color: transparent; border-radius: var(--radius-sm); }
  .list-item:active { background: var(--mint); }
  .list-item.active-item { background: var(--mint); }
  .list-item-icon { width: 36px; height: 36px; border-radius: 50%;
    background: var(--mint2); display: flex; align-items: center;
    justify-content: center; font-size: 16px; flex-shrink: 0; }
  .list-item-main { flex: 1; min-width: 0; }
  .list-item-title { font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-item-sub { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .list-item-badge { font-size: 12px; color: var(--text-sub); flex-shrink: 0; }

  .persona-avatar { width: 36px; height: 36px; border-radius: 50%;
    object-fit: cover; background: var(--mint2); flex-shrink: 0; }

  /* ── Random sheet ── */
  .random-section-title { font-size: 12px; color: var(--text-sub); margin: 8px 0 6px; }
  .random-section-title:first-child { margin-top: 0; }
  .random-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .random-btn { padding: 10px 6px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--mint2); background: var(--bg); color: var(--text);
    font-size: 14px; cursor: pointer; text-align: center; font-family: inherit;
    -webkit-tap-highlight-color: transparent; }
  .random-btn:active { background: var(--mint); }
  .random-other { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  #dice-custom { display: flex; gap: 6px; margin-top: 6px; align-items: center; flex-wrap: wrap; }
  #dice-custom input { width: 56px; padding: 6px 8px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--mint2); background: var(--bg); color: var(--text);
    font-size: 14px; text-align: center; outline: none; }
  #dice-custom label { font-size: 13px; color: var(--text-sub); }
  #custom-roll-btn { padding: 6px 14px; border-radius: 20px; border: none;
    background: var(--mint2); color: var(--text); font-size: 14px; cursor: pointer;
    font-family: inherit; }

  /* ── Screenshot overlay ── */
  #ss-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    z-index: 300; flex-direction: column; }
  #ss-overlay.visible { display: flex; }
  #ss-viewport { flex: 1; overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
    touch-action: none; }
  #ss-img { max-width: 100%; max-height: 100%; transform-origin: center center;
    touch-action: none; border-radius: 4px; display: block; user-select: none; -webkit-user-drag: none;
    will-change: transform; }
  #ss-toolbar { padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex; gap: 8px; flex-shrink: 0; }
  .ss-btn { flex: 1; padding: 11px 0; border-radius: var(--radius-sm); border: none;
    font-size: 14px; cursor: pointer; font-family: inherit; }
  #ss-add-btn { background: var(--mint2); color: var(--text); }
  #ss-close-btn { background: rgba(255,255,255,0.15); color: #fff; }
  #ss-hint { text-align: center; color: rgba(255,255,255,0.4); font-size: 11px;
    padding: 4px 0 0; flex-shrink: 0; }

  /* ── Screenshot remote control ── */
  #ss-remote-toggle { position: absolute; top: 10px; right: 10px; z-index: 10;
    padding: 6px 12px; border-radius: 20px; border: none; font-size: 13px; cursor: pointer;
    font-family: inherit; transition: background 0.2s, color 0.2s; }
  #ss-remote-toggle.off { background: rgba(255,255,255,0.15); color: #fff; }
  #ss-remote-toggle.on  { background: #FF5555; color: #fff; }
  #ss-remote-bar { display: none; flex-direction: column; gap: 6px;
    padding: 8px 12px; padding-bottom: max(8px, env(safe-area-inset-bottom));
    background: rgba(20,20,20,0.95); flex-shrink: 0; }
  #ss-remote-bar.visible { display: flex; }
  #ss-remote-input-row { display: flex; gap: 6px; align-items: flex-end; }
  #ss-remote-input { flex: 1; border: 1.5px solid rgba(255,255,255,0.25); border-radius: 20px;
    padding: 8px 14px; font-size: 15px; color: #fff; background: rgba(255,255,255,0.1);
    resize: none; outline: none; max-height: 90px; font-family: inherit; line-height: 1.4; }
  #ss-remote-input::placeholder { color: rgba(255,255,255,0.4); }
  #ss-remote-send { width: 38px; height: 38px; border-radius: 50%; border: none;
    background: #FF5555; color: #fff; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  #ss-remote-enter-wrap { display: flex; align-items: center; gap: 6px; }
  #ss-remote-enter-check { accent-color: #FF5555; width: 14px; height: 14px; }
  #ss-remote-enter-label { font-size: 12px; color: rgba(255,255,255,0.6); }
  #ss-keys { display: flex; gap: 5px; flex-wrap: wrap; }
  .ss-key { padding: 5px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); font-size: 12px;
    cursor: pointer; font-family: inherit; white-space: nowrap; -webkit-tap-highlight-color: transparent; }
  .ss-key:active { background: rgba(255,255,255,0.22); }
  /* 遙控模式游標提示 */
  #ss-img.remote-mode { cursor: crosshair; }
  /* 點擊漣漪（展開消失） */
  #ss-click-ripple { position: absolute; pointer-events: none; width: 44px; height: 44px;
    border-radius: 50%; border: 3px solid rgba(255,60,60,0.9);
    transform: translate(-50%,-50%) scale(0);
    transition: transform 0.3s ease-out, opacity 0.3s ease-out; opacity: 1; z-index: 21; }
  #ss-click-ripple.pop { transform: translate(-50%,-50%) scale(1.8); opacity: 0; }
  /* 十字準星（持續顯示在上次點擊位置） */
  #ss-crosshair { position: absolute; pointer-events: none; z-index: 20;
    transform: translate(-50%, -50%); display: none; }
  #ss-crosshair svg { width: 28px; height: 28px; }
  #ss-coord-badge { position: absolute; pointer-events: none; z-index: 22;
    background: rgba(20,20,20,0.82); color: #fff; border-radius: 10px;
    padding: 2px 7px; font-size: 11px; font-family: monospace; white-space: nowrap;
    transform: translate(-50%, calc(-100% - 10px)); display: none; }

  /* ── PC programs / system sheet ── */
  .prog-item { display: flex; align-items: center; gap: 10px; padding: 10px 8px;
    border-bottom: 1px solid var(--border); }
  .prog-icon { width: 36px; height: 36px; border-radius: 8px; object-fit: contain;
    flex-shrink: 0; background: var(--mint2); }
  .prog-icon-ph { width: 36px; height: 36px; border-radius: 8px; background: var(--mint2);
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .prog-name { flex: 1; font-size: 14px; }
  .prog-status { font-size: 11px; color: var(--text-sub); }
  .prog-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--mint2);
    background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer;
    font-family: inherit; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
  .prog-btn.stop { border-color: #FF5555; color: #FF5555; }
  .prog-btn:active { background: var(--mint); }
  .sys-btn { display: flex; width: 100%; align-items: center; gap: 12px; padding: 14px 8px;
    border-bottom: 1px solid var(--border); background: none; border-left: none; border-right: none; border-top: none;
    font-size: 15px; color: var(--text); cursor: pointer; font-family: inherit;
    -webkit-tap-highlight-color: transparent; border-radius: var(--radius-sm); }
  .sys-btn:active { background: var(--mint); }
  .sys-btn.danger { color: #E85D3F; }
  .sys-btn-icon { font-size: 24px; width: 36px; text-align: center; }

  /* ── 裝置暱稱設定 modal ── */
  #device-modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 600; align-items: center; justify-content: center; padding: 24px; }
  #device-modal-bg.visible { display: flex; }
  #device-modal { width: 100%; max-width: 340px; background: var(--surface);
    border-radius: var(--radius); padding: 24px; }
  #device-modal h2 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  #device-modal p { font-size: 13px; color: var(--text-sub); margin-bottom: 16px; line-height: 1.5; }
  #device-name-input { width: 100%; border: 1.5px solid var(--mint2); border-radius: 12px;
    padding: 10px 14px; font-size: 15px; color: var(--text); background: var(--bg);
    outline: none; font-family: inherit; margin-bottom: 12px; }
  #device-name-input:focus { border-color: var(--mint2); }
  #device-name-save { width: 100%; padding: 12px; border-radius: 20px; border: none;
    background: var(--mint2); color: var(--text); font-size: 15px; cursor: pointer;
    font-family: inherit; font-weight: 600; }

  /* ── Toast ── */
  #conn-toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 8px 16px;
    border-radius: 20px; font-size: 13px; z-index: 400; opacity: 0;
    transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  #conn-toast.visible { opacity: 1; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div id="char-avatars"></div>
  <div id="header-actions">
    <button class="icon-btn" id="menu-btn" title="選單">☰</button>
    <button class="icon-btn" id="manage-btn" title="角色管理">👥</button>
    <div id="pc-menu-wrap">
      <button class="icon-btn" id="pc-btn" title="電腦操作">🖥️</button>
      <div id="pc-menu">
        <div class="pc-menu-info" id="pc-display-info" style="display:none">觀看中：<strong id="pc-display-label">螢幕 1</strong></div>
        <div class="pc-menu-sep" id="pc-display-sep" style="display:none"></div>
        <button class="pc-menu-item" data-act="ss-chars">🖼️ 含角色截圖</button>
        <button class="pc-menu-item" data-act="ss-clean">📷 不含角色截圖</button>
        <div class="pc-menu-sep"></div>
        <button class="pc-menu-item" id="pc-switch-display-btn" data-act="switch-display" style="display:none">🖥️ 切換螢幕</button>
        <button class="pc-menu-item" data-act="switch-window">🪟 切換視窗</button>
        <div class="pc-menu-sep" id="pc-remote-sep" style="display:none"></div>
        <button class="pc-menu-item" data-act="programs" id="pc-programs-btn" style="display:none">📦 程式</button>
        <button class="pc-menu-item" data-act="system" id="pc-system-btn" style="display:none">⚙️ 系統動作</button>
      </div>
    </div>
  </div>
</div>

<!-- Chat -->
<div id="chat"></div>

<!-- Thinking bar -->
<div id="thinking-bar"></div>

<!-- Input area -->
<div id="input-area">
  <div id="pending-random">
    <span id="pending-random-text"></span>
    <button id="clear-random">✕</button>
  </div>
  <div id="tool-bar">
    <button class="tool-btn" id="random-open-btn">🎲 擲骰 / 工具</button>
  </div>
  <div id="input-row">

<!-- Toast -->
<div id="conn-toast"></div>

<script>
(function () {
  'use strict';

  window.__mobileToken = window.__mobileToken || new URLSearchParams(location.search).get('token') || '';
  (function () {
    const originalFetch = window.fetch;
    window.fetch = function(input, init) {
      init = init || {};
      const headers = new Headers(init.headers || {});
      if (window.__mobileToken) headers.set('X-DesktopST-Token', window.__mobileToken);
      init.headers = headers;
      return originalFetch.call(this, input, init);
    };
  })();

  function tokenQuery() {
    return window.__mobileToken ? '?token=' + encodeURIComponent(window.__mobileToken) : '';
  }

  // ── State ──
  let ws = null, wsRetryCount = 0;
  let state = { desktopCharacters: [], conversation: null };
  let allLibraryChars = [];
  let pendingRandom = null;
  let isWaiting = false;
  let currentSsDataUrl = null;
  let menuTab = 'conv';
  let pendingUserMsgEl = null, pendingUserContent = '';
  let ctxMsg = null, ctxEl = null;

  // ── DOM ──
  const $chat         = document.getElementById('chat');
  const $msgInput     = document.getElementById('msg-input');
  const $sendBtn      = document.getElementById('send-btn');
  const $pendingRnd   = document.getElementById('pending-random');
  const $pendingTxt   = document.getElementById('pending-random-text');
  const $toast        = document.getElementById('conn-toast');
  const $ssOverlay    = document.getElementById('ss-overlay');
  const $ssImg        = document.getElementById('ss-img');
  const $ssViewport   = document.getElementById('ss-viewport');
  const $thinkingBar  = document.getElementById('thinking-bar');

  // ── Theme ──
  const THEMES = {
    mint:     { mint:'#CBFBC4', mint2:'#AAEEDD', bg:'#F7FFFC', surface:'#ffffff', userBubble:'#AAEEFF', text:'#3D5A52', sub:'#7AA898', border:'rgba(0,0,0,0.08)' },
    butter:   { mint:'#FFE8AA', mint2:'#F0D080', bg:'#FFFDF0', surface:'#ffffff', userBubble:'#FFF0CC', text:'#5A4A2A', sub:'#9A8A5A', border:'rgba(0,0,0,0.08)' },
    peach:    { mint:'#FFD6B8', mint2:'#F0C0A0', bg:'#FFF8F4', surface:'#ffffff', userBubble:'#FFE8D8', text:'#5A3A2A', sub:'#9A7A6A', border:'rgba(0,0,0,0.08)' },
    aqua:     { mint:'#B8F4EA', mint2:'#88E8D8', bg:'#F0FFFE', surface:'#ffffff', userBubble:'#AAEEFF', text:'#2A5050', sub:'#6A9A98', border:'rgba(0,0,0,0.08)' },
    sky:      { mint:'#AAEEFF', mint2:'#88CCEE', bg:'#F0FAFF', surface:'#ffffff', userBubble:'#CCF0FF', text:'#2A4A6A', sub:'#6A8AAA', border:'rgba(0,0,0,0.08)' },
    blush:    { mint:'#FFBBBB', mint2:'#F0A0B0', bg:'#FFF5F5', surface:'#ffffff', userBubble:'#FFD8E0', text:'#5A2A3A', sub:'#9A7A88', border:'rgba(0,0,0,0.08)' },
    lavender: { mint:'#F0BBFF', mint2:'#DDA0EE', bg:'#FDF5FF', surface:'#ffffff', userBubble:'#E8D0FF', text:'#4A2A5A', sub:'#8A6A9A', border:'rgba(0,0,0,0.08)' },
    white:    { mint:'#E8E8E8', mint2:'#CCCCCC', bg:'#FFFFFF', surface:'#F8F8F8', userBubble:'#DDDDDD', text:'#3D5A52', sub:'#7BA898', border:'rgba(0,0,0,0.12)' },
    dark:     { mint:'#252525', mint2:'#333333', bg:'#111111', surface:'#1A1A1A', userBubble:'#1E3838', text:'#EEEEEE', sub:'#888888', border:'rgba(255,255,255,0.1)' },
  };
  function applyTheme(name) {
    const t = THEMES[name] || THEMES.mint;
    const s = document.documentElement.style;
    s.setProperty('--mint', t.mint);
    s.setProperty('--mint2', t.mint2);
    s.setProperty('--bg', t.bg);
    s.setProperty('--surface', t.surface);
    s.setProperty('--user-bubble', t.userBubble);
    s.setProperty('--text', t.text);
    s.setProperty('--text-sub', t.sub);
    s.setProperty('--border', t.border);
    document.querySelector('meta[name="theme-color"]').setAttribute('content', t.mint);
  }

  // ── Toast ──
  let toastTimer = null;
  function showToast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('visible');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => $toast.classList.remove('visible'), 2500);
  }

  // ── Avatar ──
  function avatarUrl(id) {
    const base = window.__relayDeviceId ? '/' + window.__relayDeviceId : '';
    return base + '/api/avatar/' + encodeURIComponent(id) + tokenQuery();
  }

  function makeImgOrPh(id, cls) {
    const img = document.createElement('img');
    img.className = cls; img.src = avatarUrl(id);
    img.onerror = () => {
      const ph = document.createElement('div');
      ph.className = cls + '-ph'; ph.textContent = '🐾';
      img.replaceWith(ph);
    };
    return img;
  }

  // ── Header ──
  function renderHeader() {
    const $av = document.getElementById('char-avatars');
    $av.innerHTML = '';
    for (const c of state.desktopCharacters) {
      const img = document.createElement('img');
      img.className = 'char-avatar'; img.src = avatarUrl(c.id); img.title = c.name;
      img.onerror = () => {
        const ph = document.createElement('div');
        ph.className = 'char-avatar-ph'; ph.textContent = '🐾'; ph.title = c.name;
        img.replaceWith(ph);
      };
      $av.appendChild(img);
    }
  }

  // ── Chat rendering ──
  function formatRandom(r) {
    if (!r) return '';
    if (r.tool === 'coin')    return '🪙 硬幣：' + r.result;
    if (r.tool === 'jiao')    return '🌙 擲茭：' + r.result;
    if (r.tool === 'omikuji') return '🎋 抽籤：' + r.result;
    if (r.tool === 'dice') {
      const kh = r.keepHighest != null ? 'kh'+r.keepHighest : '';
      const kl = r.keepLowest  != null ? 'kl'+r.keepLowest  : '';
      const mod = r.modifier > 0 ? '+'+r.modifier : r.modifier < 0 ? String(r.modifier) : '';
      return '🎲 ' + r.count + 'd' + r.faces + kh + kl + mod + ' = ' + r.total;
    }
    return '';
  }

  // Pending bar label: shows what was rolled but hides the result until sent
  function formatRandomPending(r) {
    if (!r) return '';
    if (r.tool === 'coin')    return '🪙 硬幣已擲（送出後揭曉）';
    if (r.tool === 'jiao')    return '🌙 擲茭已擲（送出後揭曉）';
    if (r.tool === 'omikuji') return '🎋 抽籤已抽（送出後揭曉）';
    if (r.tool === 'dice') {
      const kh = r.keepHighest != null ? 'kh'+r.keepHighest : '';
      const kl = r.keepLowest  != null ? 'kl'+r.keepLowest  : '';
      const mod = r.modifier > 0 ? '+'+r.modifier : r.modifier < 0 ? String(r.modifier) : '';
      return '🎲 ' + r.count + 'd' + r.faces + kh + kl + mod + '（送出後揭曉）';
    }
    return '';
  }

  function charName(id) {
    return (state.desktopCharacters.find(x=>x.id===id) || allLibraryChars.find(x=>x.id===id))?.name || '角色';
  }

  function renderMsg(msg) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + msg.role;
    wrap.dataset.msgId = msg.id;

    if (msg.role === 'system') {
      const b = document.createElement('div');
      b.className = msg.content?.startsWith('⚠️') ? 'bubble err' : 'bubble';
      b.textContent = msg.content; wrap.appendChild(b); return wrap;
    }

    let avatarEl = null;
    if (msg.role === 'character' && msg.characterId) {
      avatarEl = makeImgOrPh(msg.characterId, 'msg-avatar');
    }
    // user: no avatar

    const col = document.createElement('div'); col.className = 'msg-col';
    if (msg.role === 'character' && msg.characterId) {
      const nm = document.createElement('div'); nm.className = 'char-name';
      nm.textContent = charName(msg.characterId); col.appendChild(nm);
    }

    // Bubble + menu button container
    const bubbleRow = document.createElement('div');
    bubbleRow.style.cssText = 'display: flex; align-items: flex-end; gap: 4px;';

    const bubble = document.createElement('div'); bubble.className = 'bubble';
    if (msg.randomResult) {
      const badge = document.createElement('div');
      badge.style.cssText = 'font-size:13px;color:var(--text-sub);margin-bottom:4px;';
      badge.textContent = formatRandom(msg.randomResult); bubble.appendChild(badge);
    }
    bubble.appendChild(document.createTextNode(msg.content ?? ''));
    bubbleRow.appendChild(bubble);

    // Add menu button for non-pending messages
    if (!msg.id.startsWith('pending-')) {
      const menuBtn = document.createElement('button');
      menuBtn.className = 'msg-menu-btn';
      menuBtn.textContent = '…';
      menuBtn.style.cssText = 'flex-shrink: 0; background: none; border: none; color: rgba(0,0,0,0.2); font-size: 18px; cursor: pointer; padding: 0 2px; -webkit-tap-highlight-color: transparent; line-height: 1;';
      menuBtn.addEventListener('click', () => showMsgMenu(msg, wrap));
      bubbleRow.appendChild(menuBtn);
    }

    col.appendChild(bubbleRow);
    if (avatarEl) wrap.appendChild(avatarEl);
    wrap.appendChild(col);
    return wrap;
  }

  function renderAll() {
    $chat.innerHTML = '';
    for (const msg of (state.conversation?.messages ?? [])) $chat.appendChild(renderMsg(msg));
    scrollBottom();
  }

  function showThinkingBar(charId) {
    const name = charId ? charName(charId) : null;
    $thinkingBar.textContent = (name ? name + ' ' : '') + '正在回覆…';
    $thinkingBar.classList.add('visible');
  }
  function hideThinkingBar() { $thinkingBar.classList.remove('visible'); }

  function appendMsg(msg) {
    removeThinking();
    hideThinkingBar();
    $chat.appendChild(renderMsg(msg));
    scrollBottom();
  }

  function scrollBottom() { $chat.scrollTop = $chat.scrollHeight; }

  function showThinking() {
    removeThinking();
    const el = document.createElement('div');
    el.id = 'thinking-el'; el.className = 'thinking-indicator';
    el.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    $chat.appendChild(el); scrollBottom();
  }
  function removeThinking() { document.getElementById('thinking-el')?.remove(); }

  // ── WebSocket ──
  var wsFailCount = 0;
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    // 優先用 Worker 注入的 tunnel WebSocket URL，否則連本機
    const wsUrl = window.__tunnelWsUrl || (proto + '//' + location.host + tokenQuery());
    ws = new WebSocket(wsUrl);
    ws.addEventListener('open', () => { wsRetryCount = 0; wsFailCount = 0; showToast('已連線'); });
    ws.addEventListener('message', e => {
      let d; try { d = JSON.parse(e.data); } catch { return; }
      if (d.type === 'message' && d.message) {
        state.conversation?.messages.push(d.message);
        // If this is the echo of our optimistic user message, just update its ID
        if (d.message.role === 'user' && pendingUserMsgEl && d.message.content === pendingUserContent) {
          pendingUserMsgEl.dataset.msgId = d.message.id;
          pendingUserMsgEl = null; pendingUserContent = '';
        } else {
          appendMsg(d.message);
        }
      } else if (d.type === 'thinking') {
        showThinking();
        showThinkingBar(d.characterId);
      } else if (d.type === 'desktop-updated' && d.desktopCharacterIds) {
        refreshDesktopChars(d.desktopCharacterIds);
      } else if (d.type === 'reminder') {
        showToast('📌 ' + (d.content || '收到提醒'));
      }
    });
    ws.addEventListener('close', () => {
      ws = null;
      wsFailCount++;
      // 重試 4 次都失敗，且是透過 relay 連線 → 回 relay 重載頁面取得新 tunnel URL
      if (wsFailCount >= 4 && window.__relayPageUrl) {
        showToast('重新取得連線資訊…');
        setTimeout(() => { window.location.href = window.__relayPageUrl; }, 1000);
        return;
      }
      const delay = Math.min(500 * Math.pow(2, wsRetryCount), 8000);
      wsRetryCount++;
      showToast('連線中斷，重連中…');
      setTimeout(connectWS, delay);
    });
    ws.addEventListener('error', () => ws?.close());
  }

  async function sendMessage() {
    const content = $msgInput.value.trim();
    if ((!content && !pendingRandom) || isWaiting) return;
    isWaiting = true; $sendBtn.disabled = true;
    $msgInput.value = ''; resizeTA();
    const payload = { content };
    let randForMsg = null;
    if (pendingRandom) {
      payload.randomResult = pendingRandom;
      randForMsg = pendingRandom;
      pendingRandom = null;
      $pendingRnd.classList.remove('visible');
    }
    // Immediately show user message (optimistic)
    pendingUserContent = content;
    pendingUserMsgEl = renderMsg({ id: 'pending-' + Date.now(), role: 'user', content, randomResult: randForMsg, timestamp: Date.now() });
    $chat.appendChild(pendingUserMsgEl);
    scrollBottom();
    showThinking();
    try {
      const result = await api('/api/send', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      if (result?.error) {
        appendMsg({ id: 'err-' + Date.now(), role: 'system', content: '⚠️ ' + result.error, timestamp: Date.now() });
        pendingUserMsgEl = null; pendingUserContent = '';

  function resendMsg() {
    if (!ctxMsg || !ctxEl) return;
    // Remove this message and all subsequent from DOM
    let el = ctxEl;
    while (el) { const next = el.nextElementSibling; el.remove(); el = next; }
    removeThinking(); hideThinkingBar();
    // Clear from local state
    if (state.conversation) {
      const idx = state.conversation.messages.findIndex(m => m.id === ctxMsg.id);
      if (idx !== -1) state.conversation.messages.splice(idx);
    }
    api('/api/messages/resend', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id: ctxMsg.id }) })
      .then(r => { if (r?.error) appendMsg({ id: 'err-'+Date.now(), role: 'system', content: '⚠️ 重新發送失敗：' + r.error, timestamp: Date.now() }); })

  let ssScale = 1, ssTx = 0, ssTy = 0;
  let ssInitDist = 0, ssBaseScale = 1, ssBaseTx = 0, ssBaseTy = 0;
  let ssPanStartX = 0, ssPanStartY = 0, ssIsPinching = false, ssLastTap = 0;
  let ssGestureMoved = false; // 本次觸控序列是否發生過 pan 或 pinch（用於擋掉誤判 double-tap）

  function ssDist(t1, t2) { return Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY); }

  function clampSSPan() {
    // scale = 1 時不允許 pan;scale > 1 時 pan 範圍 = (放大後超出視口的半邊)
    if (ssScale <= 1.0001) { ssTx = 0; ssTy = 0; return; }
    const w = $ssImg.offsetWidth, h = $ssImg.offsetHeight;
    const maxX = Math.max(0, (w * ssScale - w) / 2);
    const maxY = Math.max(0, (h * ssScale - h) / 2);
    ssTx = Math.max(-maxX, Math.min(maxX, ssTx));
    ssTy = Math.max(-maxY, Math.min(maxY, ssTy));
  }

  function applySSTransform(animate) {
    clampSSPan();
    $ssImg.style.transition = animate ? 'transform 0.2s ease' : 'none';
    $ssImg.style.transform = 'translate(' + ssTx + 'px,' + ssTy + 'px) scale(' + ssScale + ')';
  }

  async function openWindowsSheet() {
    $pcSheetTitle.textContent = '切換視窗';
    $pcSheetBody.innerHTML = '<div id="pc-sheet-loading">載入中…</div>';
    $pcSheetOverlay.classList.add('visible');
    try {
      const r = await fetch('/api/windows');
      const wins = r.ok ? await r.json() : [];
      $pcSheetBody.innerHTML = '';
      if (!wins.length) {
        $pcSheetBody.innerHTML = '<div id="pc-sheet-loading">找不到開啟中的視窗</div>';
        return;
      }
      wins.forEach(w => {
        const el = document.createElement('div');
        el.className = 'pc-win-item';
        const dispLabel = displaysCache[w.displayIndex] ? displaysCache[w.displayIndex].label : `螢幕 ${w.displayIndex + 1}`;
        const minTag = w.minimized ? ' · 已最小化' : '';
        el.innerHTML = `<span class="pc-win-title">${w.title}</span><span class="pc-win-proc">${w.proc}${displaysCache.length > 1 ? ' · ' + dispLabel : ''}${minTag}</span>`;
        el.addEventListener('click', async () => {
          $pcSheetOverlay.classList.remove('visible');
          setCurrentDisplay(w.displayIndex ?? 0);
          showToast('截圖中…');
          try {
            const capturePayload = { hwnd: w.hwnd, title: w.title };
            // 視窗清單的座標只在非最小化且有效時才用作初始 fallback
            // 最小化視窗的 GetWindowRect 會回傳 x=-32000，不可使用
            const windowBoundsFromList = (!w.minimized && w.w > 0 && w.h > 0)
              ? { x: w.x, y: w.y, w: w.w, h: w.h } : null;
            lastSsRefresh = async () => {
              const r = await fetch('/api/capture-window', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(capturePayload)
              });
              if (!r.ok) return;
              const hdr = r.headers.get('X-Window-Bounds');
              if (hdr) {
                // 有新的即時座標 → 更新圖片和 bounds
                await applySsBlob(await r.blob(), hdr);
              } else {
                // 無 bounds header（PS 查詢失敗）→ 只更新圖片，保留現有 currentSsBounds 不清除
                const blob = await r.blob();
                if (currentSsDataUrl) URL.revokeObjectURL(currentSsDataUrl);
                currentSsDataUrl = URL.createObjectURL(blob);
                $ssImg.src = currentSsDataUrl;
                if (typeof hideClickMarker === 'function') hideClickMarker();
              }
            };
            const r = await fetch('/api/capture-window', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(capturePayload)
            });
            if (!r.ok) { showToast('截圖失敗'); return; }
            const boundsHeader = r.headers.get('X-Window-Bounds');
            currentSsBounds = boundsHeader ? JSON.parse(boundsHeader) : windowBoundsFromList;
            if (!currentSsBounds) showToast('⚠️ 無法取得視窗座標，遙控點擊暫時無法使用');
            const blob = await r.blob();
            if (currentSsDataUrl) URL.revokeObjectURL(currentSsDataUrl);
            currentSsDataUrl = URL.createObjectURL(blob);
            ssScale = 1; ssTx = 0; ssTy = 0;
            applySSTransform(false);
            $ssImg.src = currentSsDataUrl;
            $ssOverlay.classList.add('visible');
            checkLockStatus();
          } catch { showToast('截圖失敗'); }
        });
        $pcSheetBody.appendChild(el);
      });
    } catch {
      $pcSheetBody.innerHTML = '<div id="pc-sheet-loading">載入失敗</div>';
    }
  }

  const $pcMenu = document.getElementById('pc-menu');
  const $pcBtn = document.getElementById('pc-btn');
  function closePcMenu() { $pcMenu.classList.remove('visible'); }
  $pcBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    $pcMenu.classList.toggle('visible');
  });
  document.addEventListener('click', (e) => {
    if (!$pcMenu.contains(e.target) && e.target !== $pcBtn) closePcMenu();
  });
  $pcMenu.querySelectorAll('.pc-menu-item').forEach(btn => {
    btn.addEventListener('click', () => {
      const act = btn.dataset.act;
      closePcMenu();
      if (act === 'ss-clean') takeScreenshot(false);
      else if (act === 'ss-chars') takeScreenshot(true);
      else if (act === 'switch-display') openDisplaysSheet();
      else if (act === 'switch-window') openWindowsSheet();
      else if (act === 'programs') ensureDeviceNickname(openProgramsSheet);
      else if (act === 'system') ensureDeviceNickname(openSystemSheet);
    });
  });

  initDisplays();

  document.getElementById('ss-close-btn').addEventListener('click', () => $ssOverlay.classList.remove('visible'));

  document.getElementById('ss-add-btn').addEventListener('click', () => {
    if (!currentSsDataUrl) return;
    const imgEl = document.createElement('img');
    imgEl.src = currentSsDataUrl;
    imgEl.style.cssText = 'max-width:80%;border-radius:10px;cursor:pointer;display:block;';
    // Re-open with preserved zoom/pan
    imgEl.addEventListener('click', () => {
      $ssImg.src = currentSsDataUrl;
      applySSTransform(false);
      $ssOverlay.classList.add('visible');
    });
    const wrap = document.createElement('div'); wrap.className = 'msg user';
    const col = document.createElement('div'); col.className = 'msg-col';
    col.appendChild(imgEl); wrap.appendChild(col);
    $chat.appendChild(wrap); scrollBottom();
    $ssOverlay.classList.remove('visible');
  });

  // Pinch-zoom + pan on screenshot
  $ssImg.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      ssIsPinching = true;
      ssGestureMoved = true;
      ssInitDist = ssDist(e.touches[0], e.touches[1]);
      ssBaseScale = ssScale; ssBaseTx = ssTx; ssBaseTy = ssTy;
    } else if (e.touches.length === 1) {
      ssIsPinching = false;
      ssGestureMoved = false;
      ssPanStartX = e.touches[0].clientX - ssTx;
      ssPanStartY = e.touches[0].clientY - ssTy;
    }
  }, { passive: true });

  $ssImg.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 2) {
      ssIsPinching = true;
      ssGestureMoved = true;
      // scale 下限 1.0(不允許縮比 fit 還小,避免「彈回原大小」的視覺錯覺)
      ssScale = Math.max(1.0, Math.min(8, ssBaseScale * ssDist(e.touches[0], e.touches[1]) / ssInitDist));
      applySSTransform(false);
    } else if (e.touches.length === 1 && !ssIsPinching) {
      const dx = e.touches[0].clientX - ssPanStartX - ssTx;
      const dy = e.touches[0].clientY - ssPanStartY - ssTy;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) ssGestureMoved = true;
      ssTx = e.touches[0].clientX - ssPanStartX;
      ssTy = e.touches[0].clientY - ssPanStartY;
      applySSTransform(false);
    }
  }, { passive: false });

  $ssImg.addEventListener('touchend', e => {
    // 雙指→單指:重設剩餘手指的 pan 基準,並維持 pinching 狀態到所有手指離開
    if (e.touches.length === 1 && ssIsPinching) {
      ssPanStartX = e.touches[0].clientX - ssTx;
      ssPanStartY = e.touches[0].clientY - ssTy;
      return;
    }
    if (e.touches.length === 0) ssIsPinching = false;

    const now = Date.now();

    // ── 遙控模式：純點擊 → 送出點擊指令 ──
    if (ssRemoteMode && e.touches.length === 0 && !ssGestureMoved && !ssIsPinching) {
      const touch = e.changedTouches[0];
      if (touch) {
        const rect = $ssViewport.getBoundingClientRect();
        const tx = touch.clientX - rect.left, ty = touch.clientY - rect.top;
        const coords = ssToScreenCoords(tx, ty);
        if (coords) {
          const isDouble = now - ssLastTap < 300;
          showRipple(tx, ty);
          showClickMarker(tx, ty, coords);
          showToast(isDouble ? `雙擊 (${coords.x}, ${coords.y})` : `點擊 (${coords.x}, ${coords.y})`);
          rcFetch('/api/remote/click', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ x: coords.x, y: coords.y, double: isDouble })
          }).then(() => { if (lastSsRefresh) setTimeout(lastSsRefresh, 300); }).catch(() => {});
          ssLastTap = isDouble ? 0 : now;
        } else {
          showToast('點在截圖範圍外');
        }
      }
      return;
    }

    // Double-tap zoom（非遙控模式）
    if (e.touches.length === 0 && !ssGestureMoved && now - ssLastTap < 280) {
      ssScale = ssScale > 1.2 ? 1 : 2;
      ssTx = 0; ssTy = 0;
      applySSTransform(true);
      ssLastTap = 0;
      return;
    }
    if (!ssGestureMoved && e.touches.length === 0) ssLastTap = now;
  });

  // ── Remote Control ────────────────────────────────────────

  let rcEnabled = false;        // 鍵鼠遙控功能開啟（由 state API 決定）
  let rcSystemEnabled = false;  // 系統動作功能開啟
  let ssRemoteMode = false;     // 截圖 overlay 是否處於遙控模式

  // ── 裝置識別 ──
  function getDeviceId() {
    let id = localStorage.getItem('dest_device_id');
    if (!id) {
      id = 'dev-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
      localStorage.setItem('dest_device_id', id);
    }
    return id;
  }

  function getDeviceNickname() {
    return localStorage.getItem('dest_device_nickname') || '';
  }

  function setDeviceNickname(name) {
    localStorage.setItem('dest_device_nickname', name);
  }

  // 遙控請求專用 fetch：自動附帶裝置識別 header
  function rcFetch(url, opts) {
    opts = opts || {};
    const headers = new Headers(opts.headers || {});
    headers.set('X-Device-Id', getDeviceId());
    headers.set('X-Device-Nickname', getDeviceNickname() || '未命名裝置');
    opts.headers = headers;
    return fetch(url, opts);
  }

  // 裝置暱稱 modal
  const $deviceModalBg = document.getElementById('device-modal-bg');
  const $deviceNameInput = document.getElementById('device-name-input');

  function showDeviceModal(onSave) {
    $deviceNameInput.value = getDeviceNickname();
    $deviceModalBg.classList.add('visible');
    setTimeout(() => $deviceNameInput.focus(), 100);
    const saveBtn = document.getElementById('device-name-save');
    function doSave() {
      const name = $deviceNameInput.value.trim();
      if (!name) { $deviceNameInput.focus(); return; }
      setDeviceNickname(name);
      $deviceModalBg.classList.remove('visible');
      saveBtn.removeEventListener('click', doSave);
      $deviceNameInput.removeEventListener('keydown', onKey);
      if (onSave) onSave(name);
    }
    function onKey(e) { if (e.key === 'Enter') doSave(); }
    saveBtn.addEventListener('click', doSave);
    $deviceNameInput.addEventListener('keydown', onKey);
  }

  // 若無暱稱，先設定暱稱再執行遙控動作
  function ensureDeviceNickname(fn) {
    if (getDeviceNickname()) { fn(); return; }
    showDeviceModal(() => fn());
  }

  // 初始化時讀取遙控設定，決定是否顯示 PC 選單相關按鈕
  async function initRemoteControl() {
    try {
      const r = await rcFetch('/api/remote/programs');
      if (r.status === 403) return; // 未啟用
      // 若 /api/remote/programs 回傳正常表示白名單功能可用
      document.getElementById('pc-remote-sep').style.display = '';
      document.getElementById('pc-programs-btn').style.display = '';
    } catch {}
    // 試探系統動作是否啟用
    try {
      const r = await rcFetch('/api/remote/system', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      if (r.status !== 403) {
        rcSystemEnabled = true;
        document.getElementById('pc-system-btn').style.display = '';
      }
    } catch {}
    // 試探鍵鼠遙控
    try {
      const r = await rcFetch('/api/remote/click', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
      if (r.status !== 403) {
        rcEnabled = true;
        document.getElementById('ss-remote-toggle').style.display = '';
      }
    } catch {}
  }

  // ── 座標換算：截圖 tap → 桌面物理座標 ──
  function ssToScreenCoords(touchX, touchY) {
    if (!currentSsBounds) return null;
    const vp = $ssImg.parentElement;
    const vpW = vp.offsetWidth, vpH = vp.offsetHeight;
    const imgW = $ssImg.offsetWidth, imgH = $ssImg.offsetHeight;
    // 圖片左上角在 viewport 中的位置（含 pan/scale）
    const originX = vpW / 2 + ssTx - (imgW * ssScale) / 2;
    const originY = vpH / 2 + ssTy - (imgH * ssScale) / 2;
    // 點在圖片內的相對位置（0-1）
    const relX = (touchX - originX) / (imgW * ssScale);
    const relY = (touchY - originY) / (imgH * ssScale);
    if (relX < 0 || relX > 1 || relY < 0 || relY > 1) return null;
    // 映射到桌面物理座標
    const b = currentSsBounds;
    return { x: Math.round(b.x + relX * b.w), y: Math.round(b.y + relY * b.h) };
  }

  // ── 遙控模式 toggle ──
  const $ssRemoteToggle = document.getElementById('ss-remote-toggle');
  const $ssRemoteBar    = document.getElementById('ss-remote-bar');
  const $ssHint         = document.getElementById('ss-hint');
  const $ssRipple       = document.getElementById('ss-click-ripple');
  const $ssCrosshair    = document.getElementById('ss-crosshair');
  const $ssCoordBadge   = document.getElementById('ss-coord-badge');

  function setRemoteMode(on) {
    ssRemoteMode = on;
    $ssRemoteToggle.textContent = on ? '⏹ 停止遙控' : '遙控';
    $ssRemoteToggle.className = on ? 'on' : 'off';
    $ssRemoteBar.classList.toggle('visible', on);
    $ssHint.style.display = on ? 'none' : '';
    $ssImg.classList.toggle('remote-mode', on);
    document.getElementById('ss-add-btn').style.display = on ? 'none' : '';
    if (!on) hideClickMarker();  // 退出遙控模式時清除準星
  }

  $ssRemoteToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!ssRemoteMode) {
      ensureDeviceNickname(() => setRemoteMode(true));
    } else {
      setRemoteMode(false);
    }
  });

  // 關閉 overlay 時退出遙控模式
  document.getElementById('ss-close-btn').addEventListener('click', () => {
    setRemoteMode(false);
    $ssOverlay.classList.remove('visible');
  });

  // ── 點擊視覺回饋：漣漪 + 十字準星 + 座標標籤 ──
  function showRipple(x, y) {
    $ssRipple.style.left = x + 'px';
    $ssRipple.style.top  = y + 'px';
    $ssRipple.classList.remove('pop');
    void $ssRipple.offsetWidth; // reflow
    $ssRipple.classList.add('pop');
  }

  function showClickMarker(tx, ty, screenCoords) {
    // 十字準星定位在點擊位置
    $ssCrosshair.style.left = tx + 'px';
    $ssCrosshair.style.top  = ty + 'px';
    $ssCrosshair.style.display = 'block';
    // 座標標籤
    $ssCoordBadge.style.left = tx + 'px';
    $ssCoordBadge.style.top  = ty + 'px';
    $ssCoordBadge.textContent = `(${screenCoords.x}, ${screenCoords.y})`;
    $ssCoordBadge.style.display = 'block';
  }

  function hideClickMarker() {
    $ssCrosshair.style.display = 'none';
    $ssCoordBadge.style.display = 'none';
  }


  // ── 文字輸入 ──
  const $ssRemoteInput = document.getElementById('ss-remote-input');
  const $ssRemoteSend  = document.getElementById('ss-remote-send');
  const $ssEnterCheck  = document.getElementById('ss-remote-enter-check');

  async function sendRemoteType() {
    const text = $ssRemoteInput.value.trim();
    if (!text) return;
    $ssRemoteInput.value = '';
    $ssRemoteInput.style.height = '';
    showToast('輸入中…');
    try {
      await rcFetch('/api/remote/type', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, pressEnter: $ssEnterCheck.checked })
      });
      if (lastSsRefresh) setTimeout(lastSsRefresh, 400);
    } catch {}
  }

  $ssRemoteSend.addEventListener('click', sendRemoteType);
  $ssRemoteInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendRemoteType(); }
  });
  $ssRemoteInput.addEventListener('input', () => {
    $ssRemoteInput.style.height = 'auto';
    $ssRemoteInput.style.height = Math.min($ssRemoteInput.scrollHeight, 90) + 'px';
  });

  // ── 快捷鍵 ──
  document.querySelectorAll('.ss-key').forEach(btn => {
    btn.addEventListener('click', async () => {
      const keys = btn.dataset.key;
      showToast(keys);
      try {
        await rcFetch('/api/remote/key', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keys })
        });
      } catch {}
    });
  });

  // ── 程式 sheet ──
  const $progOverlay = document.getElementById('prog-overlay');
  const $progList    = document.getElementById('prog-list');
  document.getElementById('prog-close').addEventListener('click', () => $progOverlay.classList.remove('visible'));
  $progOverlay.addEventListener('click', (e) => { if (e.target === $progOverlay) $progOverlay.classList.remove('visible'); });

  async function openProgramsSheet() {
    $progOverlay.classList.add('visible');
    $progList.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-sub);font-size:14px">載入中…</div>';
    try {
      const r = await rcFetch('/api/remote/programs');
      const programs = r.ok ? await r.json() : [];
      if (!programs.length) {
        $progList.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-sub);font-size:14px">尚未登錄任何程式<br><span style="font-size:12px">請到設定 → 遙控 登錄白名單</span></div>';
        return;
      }
      $progList.innerHTML = '';
      programs.forEach(prog => {
        const el = document.createElement('div');
        el.className = 'prog-item';
        el.innerHTML = `
          ${prog.iconDataUrl
            ? `<img class="prog-icon" src="${prog.iconDataUrl}" alt="">`
            : `<div class="prog-icon-ph">📦</div>`}
          <div style="flex:1;min-width:0">
            <div class="prog-name">${esc(prog.name)}</div>
            <div class="prog-status">${prog.running ? '● 執行中' : '○ 未執行'}</div>
          </div>
          <button class="prog-btn ${prog.running ? 'stop' : ''}" data-id="${prog.id}" data-running="${prog.running}">
            ${prog.running ? '關閉' : '開啟'}
          </button>`;
        const btn = el.querySelector('.prog-btn');
        btn.addEventListener('click', async () => {
          const isRunning = btn.dataset.running === 'true';
          btn.disabled = true;
          btn.textContent = '…';
          try {
            const endpoint = isRunning ? '/api/remote/programs/close' : '/api/remote/programs/launch';
            await rcFetch(endpoint, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ id: prog.id })
            });
            await new Promise(r => setTimeout(r, 1000));
            openProgramsSheet(); // 重整列表
          } catch { btn.disabled = false; btn.textContent = isRunning ? '關閉' : '開啟'; }
        });
        $progList.appendChild(el);
      });
    } catch {
      $progList.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-sub);font-size:14px">載入失敗</div>';
    }
  }

  // ── 系統動作 sheet ──
  const $sysOverlay = document.getElementById('sys-overlay');
  document.getElementById('sys-close').addEventListener('click', () => $sysOverlay.classList.remove('visible'));
  $sysOverlay.addEventListener('click', (e) => { if (e.target === $sysOverlay) $sysOverlay.classList.remove('visible'); });

  function openSystemSheet() {
    updateSysScreenSection();   // 根據 rcEnabled 決定是否顯示螢幕電源區塊
    checkLockStatus();          // 刷新鎖定狀態（更新喚醒按鈕與提示）
    $sysOverlay.classList.add('visible');
  }

  async function doSystemAction(action) {
    const label = action === 'shutdown' ? '關機' : '重新開機';
    if (!confirm(`確定要${label}嗎？`)) return;
    $sysOverlay.classList.remove('visible');
    showToast(`正在${label}…`);
    try {
      await rcFetch('/api/remote/system', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action })
      });
    } catch {}
  }

  document.getElementById('sys-shutdown-btn').addEventListener('click', () => doSystemAction('shutdown'));
  document.getElementById('sys-restart-btn').addEventListener('click', () => doSystemAction('restart'));

  // ── Util ──
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── Init ──
  fetchState().then(() => { fetchLibrary(); connectWS(); initRemoteControl(); });
})();
</script>
</body>
</html>
