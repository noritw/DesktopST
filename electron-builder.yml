appId: com.desktopst.app
productName: DesktopST
directories:
  output: dist
files:
  - out/**/*
extraFiles:
  - from: assets
    to: assets
  - from: docs
    to: docs
  - from: bin/cloudflared.exe
    to: cloudflared/cloudflared.exe
    filter:
      - "**/*"
asarUnpack:
  - docs/**/*
win:
  target:
    - portable
  icon: assets/icon.ico
