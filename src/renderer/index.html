<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DesktopST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { font-family: 'Nunito', 'M PLUS Rounded 1c', system-ui, sans-serif; }
    </style>
    <script>
      (function() {
        var fs = localStorage.getItem('desktopst.fontSize');
        if (fs) {
          document.documentElement.setAttribute('data-font-size', fs);
          var map = { xs: '12px', sm: '13px', md: '14px', lg: '16px', xl: '18px' };
          document.documentElement.style.fontSize = map[fs] || '14px';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
